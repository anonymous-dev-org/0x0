name: Sync Plugin Repos

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync ${{ matrix.name }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 0x0.nvim
            app: apps/0x0.nvim
            target_repo: anonymous-dev-org/0x0.nvim
            checkout_path: 0x0-plugin

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          path: source
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target_repo }}
          token: ${{ secrets.PLUGIN_SYNC_TOKEN }}
          path: ${{ matrix.checkout_path }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build bundled Claude ACP runtime
        working-directory: source
        run: |
          bun install --frozen-lockfile
          bun run --cwd apps/claude-agent-server build

      - name: Sync plugin source
        run: |
          rsync -a --delete \
            --exclude .git \
            --exclude .github \
            --exclude LICENSE \
            --exclude LICENSE.md \
            --exclude LICENSE.txt \
            source/${{ matrix.app }}/ ${{ matrix.checkout_path }}/
          rsync -a --delete \
            --exclude .git \
            --exclude .gitignore \
            --exclude .turbo \
            --exclude node_modules \
            --exclude src \
            --exclude tests \
            --exclude tsconfig.json \
            --exclude "*.tsbuildinfo" \
            source/apps/claude-agent-server/ ${{ matrix.checkout_path }}/claude-agent-server/

      - name: Commit plugin changes
        working-directory: ${{ matrix.checkout_path }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No plugin changes."
            exit 0
          fi
          git commit -m "Sync from anonymous-dev-org/0x0@${SOURCE_SHA}"
          git push
