name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            os: linux
            arch: x64
          - name: linux-arm64
            runner: ubuntu-latest
            os: linux
            arch: arm64
          - name: darwin-arm64
            runner: macos-latest
            os: darwin
            arch: arm64
          - name: darwin-x64
            runner: macos-latest
            os: darwin
            arch: x64
          - name: windows-x64
            runner: windows-latest
            os: win32
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Build
        shell: bash
        run: |
          export ZEROXZERO_VERSION="${GITHUB_REF_NAME#v}"
          bun run script/build.ts --single --archive --os ${{ matrix.os }} --arch ${{ matrix.arch }}
        env:
          ZEROXZERO_CHANNEL: latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 0x0-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge checksums
        run: |
          cat artifacts/*/SHA256SUMS > SHA256SUMS 2>/dev/null || true
          sort -u -o SHA256SUMS SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*/*.tar.gz
            SHA256SUMS

  npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Publish
        run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
