name: Release

on:
  push:
    branches: [main]
    paths:
      - apps/server/package.json
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release. Defaults to v<apps/server/package.json version>."
        required: false

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.8"

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/server/package.json').version")
          RELEASE_TAG="${{ github.event.inputs.tag }}"
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="v${VERSION}"
          fi
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if [ "$RELEASE_VERSION" != "$VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match apps/server package version $VERSION" >&2
            exit 1
          fi
          if ! echo "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists. Bump apps/server/package.json before publishing." >&2
            exit 1
          fi

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.release_tag }}" "$GITHUB_SHA"
          git push origin "${{ steps.version.outputs.release_tag }}"

  build-server:
    name: Server — ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64,    runner: ubuntu-latest, os: linux,  arch: x64   }
          - { name: linux-arm64,  runner: ubuntu-latest, os: linux,  arch: arm64 }
          - { name: darwin-arm64, runner: macos-latest,  os: darwin, arch: arm64 }
          - { name: darwin-x64,   runner: macos-latest,  os: darwin, arch: x64   }

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - run: bun install --frozen-lockfile

      - name: Build
        working-directory: apps/server
        run: |
          bun run package --os ${{ matrix.os }} --arch ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.name }}
          path: |
            apps/server/dist/*.tar.gz
            apps/server/dist/*.zip

  release:
    name: Create Release
    needs: [prepare, build-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect archives and compute checksums
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "--- Release artifacts ---"
          ls -lh
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: release/*

  homebrew:
    name: Update Homebrew Tap
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p dl
          cd dl
          gh release download "v${VERSION}" \
            --repo anonymous-dev-org/0x0 \
            --pattern '0x0-*'
          echo "--- Downloaded ---"
          ls -lh

      - name: Compute checksums
        id: sha
        run: |
          cd dl
          for f in *; do
            key=$(echo "$f" | sed 's/[^a-zA-Z0-9]/_/g; s/\(tar_gz\|zip\)$//')
            key="${key%_}"
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "${key}=${hash}" >> "$GITHUB_OUTPUT"
          done
          cat "$GITHUB_OUTPUT"

      - name: Generate and push formulae
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO="https://github.com/anonymous-dev-org/0x0/releases/download/v${VERSION}"

          # --- Compute all checksums by downloading from the release ---
          cd dl
          SERVER_DARWIN_ARM64=$(sha256sum 0x0-darwin-arm64.zip   2>/dev/null | cut -d' ' -f1 || echo "")
          SERVER_DARWIN_X64=$(sha256sum 0x0-darwin-x64.zip     2>/dev/null | cut -d' ' -f1 || echo "")
          SERVER_LINUX_X64=$(sha256sum 0x0-linux-x64.tar.gz   2>/dev/null | cut -d' ' -f1 || echo "")
          SERVER_LINUX_ARM64=$(sha256sum 0x0-linux-arm64.tar.gz 2>/dev/null | cut -d' ' -f1 || echo "")
          test -n "${SERVER_DARWIN_ARM64}"
          test -n "${SERVER_DARWIN_X64}"
          test -n "${SERVER_LINUX_X64}"
          test -n "${SERVER_LINUX_ARM64}"

          cd ..

          # --- Clone tap ---
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/anonymous-dev-org/homebrew-tap.git" tap
          cd tap

          # --- Write formula and 0x0 alias ---
          cat > Formula/zeroxzero-server.rb << EOF
          # typed: false
          # frozen_string_literal: true

          class ZeroxzeroServer < Formula
            desc "0x0 execution server for AI coding agents"
            homepage "https://github.com/anonymous-dev-org/0x0"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${REPO}/0x0-darwin-arm64.zip"
                sha256 "${SERVER_DARWIN_ARM64}"
              end
              if Hardware::CPU.intel?
                url "${REPO}/0x0-darwin-x64.zip"
                sha256 "${SERVER_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm? and Hardware::CPU.is_64_bit?
                url "${REPO}/0x0-linux-arm64.tar.gz"
                sha256 "${SERVER_LINUX_ARM64}"
              end
              if Hardware::CPU.intel? and Hardware::CPU.is_64_bit?
                url "${REPO}/0x0-linux-x64.tar.gz"
                sha256 "${SERVER_LINUX_X64}"
              end
            end

            def install
              bin.install "0x0"
            end
          end
          EOF
          mkdir -p Aliases
          ln -sf ../Formula/zeroxzero-server.rb Aliases/0x0

          # --- Remove stale formulae ---
          rm -f Formula/zeroxzero-git.rb
          rm -f Formula/zeroxzero.rb
          rm -f Formula/zeroxzero-tui.rb

          # --- Commit and push ---
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ Aliases/
          git diff --staged --quiet && { echo "No formula changes"; exit 0; }
          git commit -m "Update formulae to v${VERSION}"
          git push
