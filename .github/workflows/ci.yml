name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun tsc --noEmit

      - name: Test
        run: bun test --preload ./test/preload.ts
