name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-server:
    name: Server — Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx turbo run typecheck

      - name: Test
        run: bunx turbo run test

      - name: Build server
        run: bunx turbo run build --filter=@anonymous-dev/0x0-server

      - name: Package server smoke test
        working-directory: apps/server
        run: |
          bun run package --os linux --arch x64
          test -f dist/0x0-linux-x64.tar.gz

  check-neovim-plugins:
    name: Neovim Plugins — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check apps/chat-nvim apps/completion-nvim
