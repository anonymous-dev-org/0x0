name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-neovim-plugins:
    name: Neovim Plugins — Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - run: bun install --frozen-lockfile

      - name: Check Lua formatting
        run: bun run format:lua:check

  test-0x0-nvim:
    name: 0x0.nvim — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Run plenary tests
        working-directory: apps/0x0.nvim
        run: make test
